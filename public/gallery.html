<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>画廊 - 天才猫</title>
    <link rel="icon" type="image/png" href="/logo.png?v=20260509" />
    <link rel="stylesheet" href="/styles.css?v=20260517-gallery" />
    <link rel="stylesheet" href="/gallery.css?v=20260517-gallery" />
  </head>
  <body class="gallery-page">
    <header class="topbar">
      <a class="brand" href="/">
        <img src="/logo.png" alt="" />
        <span>天才猫</span>
      </a>
      <nav data-nav>
        <a href="/">首页</a>
        <a href="/download.html">下载</a>
        <a href="/music.html">音乐</a>
        <a href="/gallery.html">画廊</a>
      </nav>
    </header>

    <main>
      <section class="gallery-hero">
        <div>
          <p class="eyebrow">Gallery</p>
          <h1>画廊</h1>
          <p>收藏产品、现场和创作过程里的关键画面。</p>
        </div>
      </section>

      <section class="gallery-shell">
        <div class="gallery-toolbar">
          <div>
            <strong id="galleryCount">0 张图片</strong>
            <span>点击图片查看，再次点击图片切换全屏显示。</span>
          </div>
          <div id="galleryTags" class="gallery-tags"></div>
        </div>
        <div class="gallery-masonry" id="galleryMasonry"></div>
      </section>
    </main>

    <div class="gallery-viewer" id="galleryViewer" hidden>
      <button class="gallery-viewer__close" type="button" id="galleryClose" aria-label="关闭">×</button>
      <figure id="galleryFigure">
        <img id="galleryViewerImage" alt="" />
        <figcaption>
          <strong id="galleryViewerTitle"></strong>
          <span id="galleryViewerDescription"></span>
        </figcaption>
      </figure>
    </div>

    <script src="/gallery.js?v=20260517-gallery" type="module"></script>
  </body>
</html>
