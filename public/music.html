<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>音乐频道 - 天才猫软件中心</title>
    <meta name="description" content="天才猫音乐频道，播放歌单、网易云音乐 ID 曲目和 R2 托管音频。" />
    <link rel="icon" type="image/png" href="/logo.png?v=20260509" />
    <link rel="stylesheet" href="/styles.css?v=20260510-premium-detail" />
    <link rel="stylesheet" href="/music.css?v=20260516" />
  </head>
  <body class="music-page">
    <header class="topbar topbar--music">
      <a class="brand" href="/">
        <img src="/logo.png" alt="" />
        <span>天才猫音乐</span>
      </a>
      <nav aria-label="主导航" data-nav>
        <a href="/">首页</a>
        <a href="/download.html">下载</a>
        <a href="/music.html">音乐</a>
        <a href="/articles.html">文章</a>
        <a href="/license.html">授权</a>
      </nav>
    </header>

    <main>
      <section class="music-hero">
        <div class="music-hero__copy">
          <p>Music Channel</p>
          <h1>直播间、剪辑和夜间工作，都有自己的播放台。</h1>
          <a href="#musicLibrary">进入歌单</a>
        </div>
        <div class="music-hero__visual" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </div>
      </section>

      <section class="music-library" id="musicLibrary">
        <div class="music-library__head">
          <div>
            <p>Library</p>
            <h2>精选音乐</h2>
          </div>
          <div class="music-filter">
            <input id="musicSearch" placeholder="搜索歌曲、歌手、标签" />
            <button id="clearMusicSearch" type="button">清空</button>
          </div>
        </div>
        <div class="music-grid" id="musicGrid"></div>
      </section>
    </main>

    <aside class="music-player" id="musicPlayer" hidden>
      <img id="playerCover" src="/logo.png" alt="" />
      <div>
        <strong id="playerTitle">未选择音乐</strong>
        <span id="playerArtist">选择一首歌开始播放</span>
        <input id="playerProgress" type="range" min="0" max="100" value="0" />
      </div>
      <button id="playerPlay" type="button">播放</button>
      <audio id="playerAudio" preload="metadata"></audio>
    </aside>

    <script src="/music.js?v=20260516" type="module"></script>
  </body>
</html>
