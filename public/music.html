<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>音乐频道 - 天才猫音乐</title>
    <meta name="description" content="天才猫音乐频道，提供今日主推、上新音乐、热门排行、精选标签和在线播放。" />
    <link rel="icon" type="image/png" href="/logo.png?v=20260509" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css?v=20260510-premium-detail" />
    <link rel="stylesheet" href="/music.css?v=20260517-app-polish" />
  </head>
  <body class="music-page">
    <aside class="music-sidebar">
      <a class="music-sidebar__brand" href="/music.html">
        <img src="/logo.png" alt="" />
        <span>天才猫音乐</span>
      </a>
      <nav class="music-sidebar__nav" aria-label="音乐频道导航">
        <a class="is-active" href="#musicHero"><span class="material-symbols-outlined">home</span><span>首页</span></a>
        <a href="#musicCharts"><span class="material-symbols-outlined">local_fire_department</span><span>排行榜</span></a>
        <a href="#newMusic"><span class="material-symbols-outlined">new_releases</span><span>上新</span></a>
        <a href="#musicLibrary"><span class="material-symbols-outlined">library_music</span><span>曲库</span></a>
      </nav>
      <div class="music-sidebar__stats" aria-label="音乐数据">
        <article><span>曲库</span><strong id="statTracks">0</strong></article>
        <article><span>上新</span><strong id="statNew">0</strong></article>
        <article><span>推荐</span><strong id="statFeatured">0</strong></article>
        <article><span>标签</span><strong id="statTags">0</strong></article>
      </div>
    </aside>

    <div class="music-app">
      <header class="music-topbar">
        <a class="music-mobile-brand" href="/music.html">
          <img src="/logo.png" alt="" />
          <span>天才猫音乐</span>
        </a>
        <div class="music-search">
          <span class="material-symbols-outlined">search</span>
          <input id="musicSearch" placeholder="搜索歌曲、歌手、标签" />
        </div>
        <nav aria-label="主导航" data-nav>
          <a href="/">首页</a>
          <a href="/download.html">下载</a>
          <a href="/articles.html">文章</a>
          <a href="/music.html">音乐</a>
          <a href="/license.html">授权</a>
        </nav>
      </header>

      <main class="music-main">
        <section class="music-hero" id="musicHero">
          <img class="music-hero__image" id="heroCover" src="/logo.png" alt="" />
          <div class="music-hero__shade"></div>
          <div class="music-hero__content">
            <p class="music-kicker">Today's Pick</p>
            <h1>今天听点新的</h1>
            <p class="music-hero__lead">为直播、剪辑和夜间工作准备的音乐频道。</p>
            <div class="music-hero__track">
              <strong id="heroTitle">等待音乐上架</strong>
              <span id="heroArtist">后台发布后自动展示</span>
            </div>
            <div class="music-hero__actions">
              <button type="button" id="heroPlay"><span class="material-symbols-outlined">play_arrow</span>播放主推</button>
              <a href="#newMusic"><span class="material-symbols-outlined">new_releases</span>查看上新</a>
            </div>
          </div>
        </section>

        <section class="music-layout">
          <aside class="music-panel" id="musicCharts">
            <div class="music-section-head">
              <div>
                <p class="music-kicker">Trending</p>
                <h2>热门排行</h2>
              </div>
              <a href="#musicLibrary">全部</a>
            </div>
            <div class="chart-list" id="chartList"></div>
          </aside>

          <div class="music-content">
            <section class="music-panel" id="newMusic">
              <div class="music-section-head">
                <div>
                  <p class="music-kicker">New Releases</p>
                  <h2>最新发布</h2>
                </div>
              </div>
              <div class="new-release" id="newRelease"></div>
              <div class="release-list" id="newReleaseList"></div>
            </section>

            <section class="music-panel" id="musicLibrary">
              <div class="music-section-head">
                <div>
                  <p class="music-kicker">Explore Genres</p>
                  <h2>精选标签</h2>
                </div>
                <button id="clearMusicSearch" type="button">清空</button>
              </div>
              <div class="tag-strip" id="tagStrip"></div>
              <div class="music-grid" id="musicGrid"></div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <aside class="music-player" id="musicPlayer" hidden>
      <div class="music-player__progress"><input id="playerProgress" type="range" min="0" max="100" value="0" /></div>
      <div class="music-player__body">
        <img id="playerCover" src="/logo.png" alt="" />
        <div>
          <strong id="playerTitle">未选择音乐</strong>
          <span id="playerArtist">选择一首歌开始播放</span>
        </div>
        <div class="music-player__controls">
          <button type="button" aria-label="上一首"><span class="material-symbols-outlined">skip_previous</span></button>
          <button id="playerPlay" type="button">播放</button>
          <button type="button" aria-label="下一首"><span class="material-symbols-outlined">skip_next</span></button>
        </div>
      </div>
      <audio id="playerAudio" preload="metadata"></audio>
    </aside>

    <script src="/music.js?v=20260517-app-polish" type="module"></script>
  </body>
</html>
